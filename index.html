<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="将 Shadowrocket 分享链接转换为 v2rayNG 兼容导入链接的纯前端工具。" />
    <title>iShare Link Converter</title>
  </head>
  <body>
    <main class="shell">
      <section class="hero" aria-labelledby="title">
        <p class="eyebrow">Shadowrocket → v2rayNG</p>
        <h1 id="title">把不兼容的节点分享链接，压成 v2rayNG 能吃的格式。</h1>
        <p class="lead">纯前端本地转换，不上传链接。支持 VMess、VLESS、Trojan、Shadowsocks 和 SSR 透传，并输出逐行 URI 与 Base64 订阅两种结果。</p>
      </section>

      <section class="converter" aria-label="链接转换器">
        <div class="panel input-panel">
          <div class="panel-head">
            <div>
              <p class="kicker">Paste</p>
              <h2>Shadowrocket 分享内容</h2>
            </div>
            <button id="clear" class="ghost" type="button">清空</button>
          </div>
          <textarea id="source" spellcheck="false" placeholder="粘贴单条链接、逐行订阅，或整段 Base64 订阅…"></textarea>
          <button id="convert" class="primary" type="button">一键转换</button>
        </div>

        <div class="panel output-panel">
          <div class="panel-head">
            <div>
              <p class="kicker">Export</p>
              <h2>v2rayNG 兼容结果</h2>
            </div>
            <output id="summary">Paste Shadowrocket links to begin.</output>
          </div>

          <label for="plainOutput">逐行 URI</label>
          <textarea id="plainOutput" spellcheck="false" readonly></textarea>
          <button id="copyPlain" class="ghost" type="button">复制逐行链接</button>

          <label for="base64Output">Base64 订阅</label>
          <textarea id="base64Output" spellcheck="false" readonly></textarea>
          <button id="copyBase64" class="ghost" type="button">复制 Base64</button>

          <div class="messages" aria-live="polite">
            <div>
              <h3>提醒</h3>
              <ul id="warnings"></ul>
            </div>
            <div>
              <h3>错误</h3>
              <ul id="errors"></ul>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
